<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOOSE YOUR ROLE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #f4f7f6; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .role-btn { padding: 20px; border-radius: 10px; transition: 0.3s; border: 2px solid transparent; }
        .role-btn:hover { transform: translateY(-5px); }
        .btn-teacher { background-color: #e6f0fa; color: #0f4c81; }
        .btn-teacher:hover { border-color: #0f4c81; }
        .btn-student { background-color: #d4edda; color: #155724; }
        .btn-student:hover { border-color: #155724; }
    </style>
</head>
<body>

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-5">
                    <h2 class="fw-bold mb-2" style="color: #0f4c81;">
                        <i class="bi bi-journal-check"></i> FREAKY TEST SYSTEM
                    </h2>
                    <p class="text-muted mb-4">Vui lòng chọn vai trò của bạn để tiếp tục</p>

                    <div class="d-grid gap-3">
                        <a href="teach_dash.html" class="text-decoration-none text-start role-btn btn-teacher">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-person-workspace fs-1 me-3"></i>
                                <div>
                                    <h5 class="fw-bold mb-0">Dành cho Giáo viên</h5>
                                    <small>Quản lý câu hỏi, đề thi và điểm số</small>
                                </div>
                            </div>
                        </a>

                        <a href="student_dash.html" class="text-decoration-none text-start role-btn btn-student">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-mortarboard-fill fs-1 me-3"></i>
                                <div>
                                    <h5 class="fw-bold mb-0">Dành cho Học sinh</h5>
                                    <small>Xem lại lịch sử làm bài (WIP)</small>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
